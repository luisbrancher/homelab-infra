---

- name: Configure pi4
  hosts: pi4                # hosts do inventory que se aplica
  become: true                   # sudo

  pre_tasks:
    # apt-get update
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600  # só atualiza se o cache tiver mais de 1h


  tasks:
    # omada controller
    - name: Install Omada dependencies
      ansible.builtin.apt:
        name:
          - openjdk-17-jre-headless
          - jsvc
        state: present

    - name: Download Omada Controller package
      ansible.builtin.get_url:
        url: "{{ omada_download_url }}"
        dest: /tmp/omada.deb

    - name: Install Omada Controller
      ansible.builtin.apt:
        deb: /tmp/omada.deb
        state: present

    - name: Ensure Omada Controller is running and enabled on boot
      ansible.builtin.service:
        name: omada-controller
        state: started
        enabled: true

    # motioneye
    - name: Install MotionEye dependencies
      ansible.builtin.apt:
        name:
          - motion
          - python3-pip
          - python3-dev
        state: present

    - name: Install MotionEye with pip
      ansible.builtin.pip:
        name: motioneye
        state: present

    - name: Ensure MotionEye is running and enabled on boot
      ansible.builtin.service:
        name: motioneye
        state: started
        enabled: true

    # nfs client
    - name: Install NFS client
      ansible.builtin.apt:
        name: nfs-common
        state: present

    # upsnap
    - name: Create UpSnap NFS mount point
      ansible.builtin.file:
        path: /mnt/data/upsnap
        state: directory
        mode: '0755'

    - name: Mount NFS upsnap share
      ansible.posix.mount:
        path: /mnt/data/upsnap
        src: "{{ nfs_server }}:/mnt/data/upsnap"
        fstype: nfs
        opts: defaults,_netdev
        state: mounted

    - name: Download UpSnap binary
      ansible.builtin.get_url:
        url: "https://github.com/seriousm4x/UpSnap/releases/download/v{{ upsnap_version }}/upsnap_{{ upsnap_version }}_linux_arm64.zip"
        dest: /tmp/upsnap.zip

    - name: Unzip UpSnap binary
      ansible.builtin.unarchive:
        src: /tmp/upsnap.zip
        dest: /usr/local/bin/
        remote_src: true
        creates: /usr/local/bin/upsnap

    - name: Ensure UpSnap binary is executable
      ansible.builtin.file:
        path: /usr/local/bin/upsnap
        mode: '0755'

    - name: Deploy UpSnap systemd service
      ansible.builtin.template:
        src: templates/upsnap.service.j2
        dest: /etc/systemd/system/upsnap.service
      notify: Restart UpSnap
      
    - name: Ensure UpSnap is running and enabled on boot
      ansible.builtin.service:
        name: upsnap
        state: started
        enabled: true
        daemon_reload: true

  # node exporter
    - name: Install Node Exporter
      ansible.builtin.apt:
        name: prometheus-node-exporter
        state: present

    - name: Ensure Node Exporter is running and enabled on boot
      ansible.builtin.service:
        name: prometheus-node-exporter
        state: started
        enabled: true

  # tailscale
    - name: Download and run Tailscale installation script
      ansible.builtin.shell:
        cmd: curl -fsSL https://tailscale.com/install.sh | sh
        creates: /usr/bin/tailscale  # idempotência: só roda se o binário ainda não existir

    - name: Connect to Tailscale with auth key
      ansible.builtin.command:
        cmd: tailscale up --authkey="{{ tailscale_auth_key }}"
        creates: /var/lib/tailscale/tailscaled.state  # idem — evita reconectar toda vez

    - name: Ensure Tailscale is running and enabled on boot
      ansible.builtin.service:
        name: tailscaled
        state: started
        enabled: true

  handlers:
      - name: Restart UpSnap
        ansible.builtin.service:
          name: upsnap
          state: restarted        