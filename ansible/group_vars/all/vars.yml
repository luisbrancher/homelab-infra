ansible_ssh_private_key_file: ~/.ssh/id_ed25519
ansible_become: yes

# proxmox
nfs_server: "{{ hostvars['storage-server']['ansible_host'] }}"

k3s_node_ip: "{{ hostvars['k3s-node']['ansible_host'] }}"
storage_server_ip: "{{ hostvars['storage-server']['ansible_host'] }}"
lxc_monitoring_ip: "{{ hostvars['lxc-monitoring']['ansible_host'] }}"

storage_mount: /mnt/data
storage_device: /dev/sdb

grafana_port: 3000
grafana_admin_user: admin

loki_version: "3.7.2"
loki_port: 3100

nfs_exports:
  - path: /mnt/data/nextcloud
    clients: "{{ k3s_node_ip }}"
    options: rw,sync,no_subtree_check,no_root_squash
  - path: /mnt/data/immich
    clients: "{{ k3s_node_ip }}"
    options: rw,sync,no_subtree_check,no_root_squash
  - path: /mnt/data/backups
    clients: "{{ k3s_node_ip }}"
    options: rw,sync,no_subtree_check,no_root_squash
  - path: /mnt/data/upsnap
    clients: "{{ pi4_ip }}"
    options: rw,sync,no_subtree_check,no_root_squash

# pi4
pi4_ip: "{{ hostvars['pi4']['ansible_host'] }}"

omada_port: 8043

upsnap_version: "5.3.1"
upsnap_port: 8090

motioneye_port: 8765